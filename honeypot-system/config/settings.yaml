# ──────────────────────────────────────────────────────────────────────────────
# Eurosystem default configuration
# Override any value with an environment variable using UPPER_SNAKE_CASE.
# Example: MQTT_HOST=broker.example.com overrides mqtt.host below.
# ──────────────────────────────────────────────────────────────────────────────

# ── MQTT broker ───────────────────────────────────────────────────────────────
mqtt:
  host:  "localhost"
  port:  1883
  topic: "eurosystem/logs"

# ── Log collectors ────────────────────────────────────────────────────────────
collectors:
  bash:
    path: "/var/log/bash_history.log"
  auditd:
    path: "/var/log/audit/audit.log"
  journald:
    unit:  ""          # empty = all units; set e.g. "sshd.service"
    lines: "500"

# ── Threat-intel enrichers ────────────────────────────────────────────────────
enrichers:
  virustotal:
    api_key: ""        # set via VT_API_KEY env var or here
  abuseipdb:
    api_key: ""
  shodan:
    api_key: ""

# ── Pipeline composition ──────────────────────────────────────────────────────
pipeline:
  services:    ["bash", "apache", "ftp", "cowrie", "custom_service"]
  collectors:  ["bash", "auditd", "journald"]
  publishers:  ["mqtt"]
  enrichers:   ["virustotal", "abuseipdb", "shodan"]
